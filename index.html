<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Parallax 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000000;
    --surface: rgba(255,255,255,0.05);
    --surface-hover: rgba(255,255,255,0.09);
    --border: rgba(255,255,255,0.1);
    --text: #f5f5f7;
    --text-secondary: rgba(255,255,255,0.45);
    --accent: #0a84ff;
    --accent-hover: #409cff;
    --green: #30d158;
    --red: #ff453a;
    --radius: 10px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 16px;
  }

  #header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
    white-space: nowrap;
    opacity: 0.9;
  }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    padding: 6px 14px;
    border-radius: 980px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .btn:hover {
    background: var(--surface-hover);
    border-color: rgba(255,255,255,0.2);
  }
  .btn.primary {
    background: var(--accent);
    border-color: transparent;
    color: #fff;
    font-weight: 500;
  }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.destructive {
    background: rgba(255,69,58,0.15);
    border-color: rgba(255,69,58,0.3);
    color: var(--red);
  }
  .btn.destructive:hover { background: rgba(255,69,58,0.22); }

  label.btn { display: inline-block; }
  #fileInput { display: none; }

  #sens-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 80px;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  /* Status bar */
  #status-bar {
    display: flex;
    gap: 20px;
    align-items: center;
    padding: 0 24px;
    height: 32px;
    background: rgba(0,0,0,0.5);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-secondary);
    flex-shrink: 0;
    letter-spacing: -0.01em;
  }

  .status-item { display: flex; align-items: center; gap: 5px; }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .dot.on  { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .dot.off { background: rgba(255,255,255,0.12); }

  #fps { margin-left: auto; font-variant-numeric: tabular-nums; }

  /* Main */
  #main {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #three-canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  /* Webcam pip */
  #pip {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 148px;
    height: 110px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    background: #111;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 0.5px rgba(255,255,255,0.05);
    display: none;
  }
  #webcam {
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }
  #face-canvas {
    position: absolute; top:0; left:0;
    width:100%; height:100%;
    transform: scaleX(-1);
    pointer-events: none;
  }

  /* Overlay */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    pointer-events: none;
    text-align: center;
    padding: 40px;
  }
  #overlay .icon { font-size: 36px; opacity: 0.6; }
  #overlay p {
    font-size: 13px;
    color: var(--text-secondary);
    max-width: 260px;
    line-height: 1.6;
    font-weight: 400;
  }
  #overlay strong { color: rgba(255,255,255,0.6); font-weight: 500; }
  #overlay.hidden { display: none; }

  /* Drop zone */
  #drop-zone {
    position: absolute; inset: 0;
    border: 1.5px dashed rgba(10,132,255,0.4);
    border-radius: 16px;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    background: rgba(10,132,255,0.05);
    z-index: 20;
    pointer-events: none;
    letter-spacing: -0.01em;
  }
  #drop-zone.active { display: flex; }
</style>
</head>
<body>

<div id="header">
  <h1>Face Parallax</h1>
  <div class="controls">
    <button class="btn primary" id="camBtn">Start Camera</button>
    <label class="btn" for="fileInput">Load Model</label>
    <input type="file" id="fileInput" accept=".glb,.gltf,.obj">
    <div id="sens-wrap">
      <span>Sensitivity</span>
      <input type="range" id="sensitivity" min="1" max="10" value="5" step="0.5">
    </div>
    <button class="btn" id="resetBtn">Reset</button>
  </div>
</div>

<div id="status-bar">
  <div class="status-item"><div class="dot off" id="dot-cam"></div><span>Camera</span></div>
  <div class="status-item"><div class="dot off" id="dot-face"></div><span>Face</span></div>
  <div class="status-item"><div class="dot on"  id="dot-model"></div><span>Model</span></div>
  <span id="fps">— fps</span>
</div>

<div id="main">
  <canvas id="three-canvas"></canvas>

  <div id="overlay">
    <div class="icon">⬡</div>
    <p>Click <strong>Start Camera</strong> to enable face-tracking parallax. Drop a GLB, GLTF, or OBJ to load a custom model.</p>
  </div>

  <div id="drop-zone">Drop model here</div>

  <div id="pip">
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="face-canvas"></canvas>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<script>
// ── RENDERER ──────────────────────────────────────────────────────────────────
const canvas  = document.getElementById('three-canvas');
const mainEl  = document.getElementById('main');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.setClearColor(0x000000, 1);

const scene = new THREE.Scene();

const cam3d = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
cam3d.position.set(0, 0, 5);

// ── LIGHTS ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

const key = new THREE.DirectionalLight(0xffffff, 1.4);
key.position.set(4, 6, 5);
key.castShadow = true;
scene.add(key);

const fill = new THREE.DirectionalLight(0x88aaff, 0.35);
fill.position.set(-5, 2, 3);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xffffff, 0.5);
rim.position.set(0, -4, -4);
scene.add(rim);

// ── DEFAULT CUBE ──────────────────────────────────────────────────────────────
const modelGroup = new THREE.Group();
scene.add(modelGroup);

function makeDefaultCube() {
  modelGroup.clear();

  // Clean aluminium-ish material
  const geo = new THREE.BoxGeometry(1.8, 1.8, 1.8, 1, 1, 1);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xd4d4d8,
    metalness: 0.65,
    roughness: 0.2,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  modelGroup.add(mesh);

  // Thin dark edge lines only
  const edges = new THREE.EdgesGeometry(geo);
  const lineMat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.25 });
  modelGroup.add(new THREE.LineSegments(edges, lineMat));

  setDot('model', true);
}
makeDefaultCube();

// ── RESIZE ────────────────────────────────────────────────────────────────────
function onResize() {
  const w = mainEl.clientWidth, h = mainEl.clientHeight;
  renderer.setSize(w, h);
  cam3d.aspect = w / h;
  cam3d.updateProjectionMatrix();
}
new ResizeObserver(onResize).observe(mainEl);
onResize();

// ── FACE TRACKING STATE ───────────────────────────────────────────────────────
let faceX = 0, faceY = 0, smoothX = 0, smoothY = 0;
let cameraRunning = false;
const SMOOTH = 0.1;

function getSens() { return parseFloat(document.getElementById('sensitivity').value) * 0.065; }

// ── ANIMATION ─────────────────────────────────────────────────────────────────
let lastT = performance.now(), frames = 0;
const overlay = document.getElementById('overlay');

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  frames++;
  if (frames % 30 === 0) {
    document.getElementById('fps').textContent = Math.round(1000 / (now - lastT) * 30) + ' fps';
  }
  lastT = now;

  smoothX += (faceX - smoothX) * SMOOTH;
  smoothY += (faceY - smoothY) * SMOOTH;

  const s = getSens();

  if (cameraRunning) {
    // INVERTED: face goes right → cube rotates right (shows left face)
    // face goes up → cube tilts up (shows bottom face)
    modelGroup.rotation.y = smoothX * s * Math.PI;
    // Y sensitivity boosted (× 1.4 vs X) since vertical head movement is smaller
    modelGroup.rotation.x = smoothY * s * Math.PI * 1.4;
  } else {
    modelGroup.rotation.y += 0.003;
    modelGroup.rotation.x = Math.sin(now * 0.0004) * 0.12;
  }

  renderer.render(scene, cam3d);
}
animate();

// ── MEDIAPIPE ─────────────────────────────────────────────────────────────────
const videoEl    = document.getElementById('webcam');
const faceCanvas = document.getElementById('face-canvas');
const faceCtx    = faceCanvas.getContext('2d');
let faceMesh = null;

function initFaceMesh() {
  faceMesh = new FaceMesh({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: false,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6,
  });
  faceMesh.onResults(onFaceResults);
}

function onFaceResults(results) {
  faceCanvas.width  = videoEl.videoWidth;
  faceCanvas.height = videoEl.videoHeight;
  faceCtx.clearRect(0, 0, faceCanvas.width, faceCanvas.height);

  if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
    setDot('face', true);
    const lm = results.multiFaceLandmarks[0];

    let minX = 1, maxX = 0, minY = 1, maxY = 0;
    for (const p of lm) {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }
    const cx = (minX + maxX) / 2;
    const cy = (minY + maxY) / 2;

    // Raw offset from center (-1 to 1).
    // No inversion here — the rotation code above maps directly:
    // face right (cx > 0.5) → positive smoothX → positive rotation.y → cube rotates right ✓
    // face up (cy < 0.5) → negative rawY → negative smoothY → negative rotation.x → cube tilts back ✓
    faceX = (cx - 0.5) * 2;
    faceY = (cy - 0.5) * 2;

    // Tiny indicator dot on nose tip
    const n = lm[1];
    faceCtx.beginPath();
    faceCtx.arc(n.x * faceCanvas.width, n.y * faceCanvas.height, 4, 0, Math.PI * 2);
    faceCtx.fillStyle = 'rgba(255,255,255,0.7)';
    faceCtx.fill();
  } else {
    setDot('face', false);
    faceX *= 0.92;
    faceY *= 0.92;
  }
}

// ── CAMERA ────────────────────────────────────────────────────────────────────
let mpCam = null;

async function startCamera() {
  if (!faceMesh) initFaceMesh();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' }
    });
    videoEl.srcObject = stream;
    await videoEl.play();

    document.getElementById('pip').style.display = 'block';
    overlay.classList.add('hidden');
    setDot('cam', true);
    cameraRunning = true;

    const btn = document.getElementById('camBtn');
    btn.textContent = 'Stop Camera';
    btn.classList.remove('primary');
    btn.classList.add('destructive');

    mpCam = new Camera(videoEl, {
      onFrame: async () => { await faceMesh.send({ image: videoEl }); },
      width: 640, height: 480,
    });
    mpCam.start();

  } catch (err) {
    console.error('Camera error:', err);
    const msg = err.name === 'NotAllowedError'
      ? 'Camera permission denied — please allow access in your browser settings.'
      : err.name === 'NotFoundError'
      ? 'No camera detected on this device.'
      : 'Camera error: ' + err.message;
    alert(msg);
    setDot('cam', false);
    cameraRunning = false;
  }
}

function stopCamera() {
  if (mpCam) { mpCam.stop(); mpCam = null; }
  if (videoEl.srcObject) { videoEl.srcObject.getTracks().forEach(t => t.stop()); videoEl.srcObject = null; }
  document.getElementById('pip').style.display = 'none';
  setDot('cam', false); setDot('face', false);
  cameraRunning = false; faceX = 0; faceY = 0;
  const btn = document.getElementById('camBtn');
  btn.textContent = 'Start Camera';
  btn.classList.add('primary');
  btn.classList.remove('destructive');
  overlay.classList.remove('hidden');
}

document.getElementById('camBtn').addEventListener('click', () => {
  if (!cameraRunning) startCamera(); else stopCamera();
});

// ── MODEL LOADING ─────────────────────────────────────────────────────────────
const gltfLoader = new THREE.GLTFLoader();
const objLoader  = new THREE.OBJLoader();

document.getElementById('fileInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  loadFile(f); e.target.value = '';
});

function loadFile(file) {
  const url = URL.createObjectURL(file);
  const ext = file.name.split('.').pop().toLowerCase();
  overlay.classList.remove('hidden');
  overlay.querySelector('.icon').textContent = '⏳';
  overlay.querySelector('p').innerHTML = 'Loading model…';

  if (ext === 'glb' || ext === 'gltf') {
    gltfLoader.load(url, g => placeModel(g.scene, url), undefined, err => { alert('GLTF error: ' + err.message); overlay.classList.add('hidden'); });
  } else if (ext === 'obj') {
    objLoader.load(url, obj => {
      obj.traverse(c => { if (c.isMesh) c.material = new THREE.MeshStandardMaterial({ color: 0xd4d4d8, metalness: 0.5, roughness: 0.3 }); });
      placeModel(obj, url);
    }, undefined, err => { alert('OBJ error: ' + err.message); overlay.classList.add('hidden'); });
  } else {
    alert('Use GLB, GLTF, or OBJ.'); overlay.classList.add('hidden');
  }
}

function placeModel(obj, blobUrl) {
  const box = new THREE.Box3().setFromObject(obj);
  const sz  = box.getSize(new THREE.Vector3());
  const ctr = box.getCenter(new THREE.Vector3());
  const sc  = 2.6 / Math.max(sz.x, sz.y, sz.z);
  obj.scale.setScalar(sc);
  obj.position.sub(ctr.multiplyScalar(sc));
  obj.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  modelGroup.clear();
  modelGroup.add(obj);
  URL.revokeObjectURL(blobUrl);
  overlay.classList.add('hidden');
  setDot('model', true);
}

// ── DRAG & DROP ───────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
mainEl.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('active'); });
mainEl.addEventListener('dragleave', ()  => dropZone.classList.remove('active'));
mainEl.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('active');
  const f = e.dataTransfer.files[0]; if (f) loadFile(f);
});

// ── RESET ─────────────────────────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  makeDefaultCube();
  faceX = faceY = smoothX = smoothY = 0;
  modelGroup.rotation.set(0, 0, 0);
  overlay.querySelector('.icon').textContent = '⬡';
  overlay.querySelector('p').innerHTML = 'Click <strong>Start Camera</strong> to enable face-tracking parallax. Drop a GLB, GLTF, or OBJ to load a custom model.';
});

// ── STATUS DOTS ───────────────────────────────────────────────────────────────
function setDot(which, on) {
  const d = document.getElementById('dot-' + which);
  if (d) { d.className = 'dot ' + (on ? 'on' : 'off'); }
}

// ── KEYS ──────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'c') document.getElementById('camBtn').click();
  if (e.key === 'r') document.getElementById('resetBtn').click();
});
</script>
</body>
</html>
